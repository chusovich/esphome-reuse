#  Home Assistant API
api:
  encryption:
    key: ${api_key}
  reboot_timeout: 0s

# OTA Updates
ota:
  - platform: esphome
    password: ${ota_password}

# Web Server
web_server:
  version: 3
  port: 80
  auth:
    username: ${web_server_username}
    password: ${web_server_password}

# Enable logging
# logger:

# Prometheus Exporter
prometheus:

# Uptime Sensor
sensor:
  - platform: uptime
    name: "Uptime"
    id: uptime_sensor
    update_interval: 20s
    entity_category: "diagnostic"
