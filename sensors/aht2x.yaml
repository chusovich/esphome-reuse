sensor:
  - platform: aht10
    variant: AHT20
    update_interval: ${sensor_update_interval}
    temperature:
      name: "AHT2X Temperature"
      id: aht2x_temp
      filters:
        - lambda: return x * (9.0/5.0) + 32.0;
      unit_of_measurement: "°F"
    humidity:
      name: "AHT2X Relative Humidity"
      id: aht2x_hum
      
